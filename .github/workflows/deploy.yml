name: Deploy to GitHub Pages

# Publishes the static app once changes land on main. The app is plain ES
# modules + static assets, so there's no build step — we upload the repo as-is
# (minus dev-only files).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site files
        run: |
          mkdir -p _site
          cp -r index.html manifest.webmanifest sw.js src icons version.json _site/
      - name: Stamp build version
        run: |
          VER=$(node -p "require('./version.json').version")
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          printf '{ "version": "%s", "build": "%s", "date": "%s" }\n' "$VER" "$SHA" "$DATE" > _site/version.json
          echo "Stamped version.json: v$VER · $SHA · $DATE"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
