name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run DSP test suite
        run: node --test
      - name: Regenerate icons (sanity check generator)
        run: node scripts/generate-icons.mjs
